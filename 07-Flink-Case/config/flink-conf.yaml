# =============================================================================
# flink-conf.yaml  —  Apache Flink Configuration for Fraud Detection Tutorial
# =============================================================================
# This file configures a single-node local Flink cluster suitable for
# development and learning. Each setting is annotated to explain WHY it
# matters, not just what it does.
#
# For a production cluster, this file lives at:
#   $FLINK_HOME/conf/flink-conf.yaml
# For Docker-based deployments, it is mounted as a volume (see docker-compose.yml).
# =============================================================================


# =============================================================================
# SECTION 1: JOBMANAGER
# =============================================================================
# The JobManager is the "master" process. It:
#   - Accepts submitted Flink jobs
#   - Builds the execution graph (DAG of tasks)
#   - Schedules tasks onto TaskManagers
#   - Coordinates checkpoints and recovery
# =============================================================================

jobmanager.rpc.address: localhost
# ↑ Hostname or IP that TaskManagers use to reach the JobManager.
#   In Docker/Kubernetes: use the service name (e.g., "flink-jobmanager")
#   Locally: "localhost" is fine

jobmanager.rpc.port: 6123
# ↑ Port for RPC communication between JobManager and TaskManagers

jobmanager.bind-host: 0.0.0.0
# ↑ Which network interface the JobManager listens on.
#   0.0.0.0 = all interfaces (needed in containers)

jobmanager.memory.process.size: 1600m
# ↑ Total memory for the JobManager JVM process.
#   Breakdown (Flink manages this automatically):
#     - JVM heap: for Flink's own data structures (job graph, metadata)
#     - JVM metaspace: for class loading
#     - Off-heap: network buffers, etc.
#   For this tutorial 1.6GB is plenty. Production with large state: 4–8GB.

rest.port: 8081
# ↑ Port for the Flink Web UI (http://localhost:8081).
#   You can monitor jobs, view task graphs, check checkpoints here.

rest.address: 0.0.0.0
# ↑ Web UI is accessible from any host (important in Docker environments)


# =============================================================================
# SECTION 2: TASKMANAGER
# =============================================================================
# TaskManagers are the "worker" processes. Each one:
#   - Runs one or more task slots
#   - Executes the actual Flink operators (map, filter, window, etc.)
#   - Maintains keyed state for the partitions assigned to it
# =============================================================================

taskmanager.bind-host: 0.0.0.0
taskmanager.host: localhost

taskmanager.numberOfTaskSlots: 4
# ↑ Number of task slots per TaskManager.
#   A "slot" is a unit of resource (think: a lane for processing).
#   Each parallel subtask of your job occupies one slot.
#
#   For fraud detection: we key by customer_id, so Flink needs enough
#   slots to run all parallel instances of FraudDetectionFunction.
#
#   Rule of thumb: set this to the number of CPU cores on the machine.
#   Here: 4 slots means up to parallelism=4 on a single TaskManager.

taskmanager.memory.process.size: 1728m
# ↑ Total memory for each TaskManager JVM process.
#   Flink's memory model divides this into:
#
#   ┌─────────────────────────────────────────────────────────────┐
#   │  Total Process Memory (1728m)                               │
#   │  ┌─────────────────────────────────────────────────────┐   │
#   │  │  Total Flink Memory                                  │   │
#   │  │  ┌────────────────┐  ┌────────────────────────────┐ │   │
#   │  │  │  Task Heap     │  │  Managed Memory            │ │   │
#   │  │  │  (user code,   │  │  (RocksDB state backend,   │ │   │
#   │  │  │   Java objects) │  │   sort/hash operators)    │ │   │
#   │  │  └────────────────┘  └────────────────────────────┘ │   │
#   │  │  ┌─────────────────────────────────────────────────┐ │   │
#   │  │  │  Network Memory (shuffle buffers, ~64–128MB)     │ │   │
#   │  │  └─────────────────────────────────────────────────┘ │   │
#   │  └─────────────────────────────────────────────────────┘   │
#   │  ┌─────────────────────────────────────────────────────┐   │
#   │  │  JVM Metaspace + Overhead (class loading, GC, etc.) │   │
#   │  └─────────────────────────────────────────────────────┘   │
#   └─────────────────────────────────────────────────────────────┘

taskmanager.memory.task.heap.size: 512m
# ↑ Heap memory available for user-defined functions (your Python code
#   runs in a separate Python process, but Java-side objects live here)

taskmanager.memory.managed.size: 512m
# ↑ Memory pool that Flink manages directly (bypasses JVM GC).
#   Used by: RocksDB state backend, sort operators, hash join operators.
#   IMPORTANT for fraud detection: if you use RocksDB (recommended for
#   large customer state), increase this. RocksDB uses this as its
#   block cache for hot state.


# =============================================================================
# SECTION 3: PARALLELISM
# =============================================================================

parallelism.default: 2
# ↑ Default number of parallel instances for each operator in your job.
#   With parallelism=2:
#     - FraudDetectionFunction runs as 2 parallel instances
#     - Kafka partitions (if used) are split across 2 consumers
#     - Customer IDs are hashed and split across 2 buckets
#
#   For this tutorial: 2 is fine. In production, set to match the
#   number of Kafka partitions in your input topic.
#   Rule: parallelism ≤ total_task_slots across all TaskManagers

pipeline.max-parallelism: 128
# ↑ Maximum parallelism (used for key group assignment).
#   Flink pre-shards key groups up to this number, enabling
#   rescaling (changing parallelism) without losing state.
#   Set this ONCE and never change it after the first checkpoint.


# =============================================================================
# SECTION 4: STATE BACKEND
# =============================================================================
# The state backend determines WHERE and HOW Flink stores keyed state.
#
# Options:
#   hashmap  → In JVM heap. Fast reads/writes. Limited by RAM.
#              Good for: small state (< few GB total), development.
#
#   rocksdb  → In RocksDB (embedded key-value store, disk + memory cache).
#              Handles arbitrarily large state. Slightly slower than hashmap
#              due to serialization and disk I/O on cache misses.
#              Good for: production fraud detection (millions of customers).
# =============================================================================

state.backend: hashmap
# ↑ Use hashmap for this tutorial (simpler setup).
#   To switch to RocksDB: change to "rocksdb" and ensure
#   state.backend.rocksdb.localdir is configured.

# state.backend: rocksdb
# state.backend.rocksdb.localdir: /tmp/flink-rocksdb
# state.backend.rocksdb.memory.managed: true
# ↑ Uncomment the 3 lines above to switch to RocksDB.
#   "memory.managed: true" means RocksDB uses Flink's managed memory
#   pool rather than allocating its own — prevents OOM errors.

state.storage.fs.default-value.fileSystemScheme: file
# ↑ Where checkpoints and savepoints are stored by default.
#   Schemes: "file" (local), "hdfs", "s3", "gs", "wasb" (Azure Blob)

state.savepoints.dir: file:///tmp/flink-savepoints
# ↑ Default directory for savepoints (manual snapshots used for
#   planned upgrades/migrations).

state.checkpoints.dir: file:///tmp/flink-checkpoints
# ↑ Default directory for automatic checkpoints (fault tolerance).


# =============================================================================
# SECTION 5: CHECKPOINTING
# =============================================================================
# Checkpointing is Flink's fault-tolerance mechanism.
# Periodically, Flink takes a consistent snapshot of ALL state across
# ALL TaskManagers and writes it to durable storage.
# If a failure occurs, Flink restarts from the last checkpoint.
#
# For fraud detection: checkpointing ensures we never lose transaction
# history stored in state, even if a machine crashes.
# =============================================================================

execution.checkpointing.interval: 30000
# ↑ Take a checkpoint every 30 seconds (value in milliseconds).
#   Shorter intervals → faster recovery (less re-processing after failure)
#   Shorter intervals → more overhead (more I/O for writing checkpoints)
#   For fraud detection: 30–60 seconds is a good balance.

execution.checkpointing.mode: EXACTLY_ONCE
# ↑ Exactly-once semantics: each transaction is processed exactly once,
#   even after failure and recovery.
#   Options: EXACTLY_ONCE (stronger, slightly more overhead) or AT_LEAST_ONCE
#   For fraud detection: use EXACTLY_ONCE to avoid duplicate alerts.

execution.checkpointing.timeout: 60000
# ↑ If a checkpoint takes longer than 60 seconds, abort it.
#   Prevents a slow checkpoint from blocking the entire job.

execution.checkpointing.max-concurrent-checkpoints: 1
# ↑ Only 1 checkpoint in progress at a time.
#   Prevents overlapping checkpoints from overwhelming state backends.

execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
# ↑ Keep the last checkpoint when the job is cancelled (not just on failure).
#   This allows you to restart from a savepoint after intentional shutdown.

state.backend.incremental: true
# ↑ For RocksDB: only checkpoint the DELTA (changes since last checkpoint),
#   not the full state. Critical for large state — reduces checkpoint size
#   from GB to MB in many cases.
#   Has no effect with hashmap backend.


# =============================================================================
# SECTION 6: PYTHON (PYFLINK)
# =============================================================================
# PyFlink runs your Python operators in a separate Python process.
# These settings control the Python execution environment.
# =============================================================================

python.executable: python3
# ↑ Path to the Python interpreter. Use a full path if you have
#   multiple Python versions: /usr/local/bin/python3.10

python.fn-execution.bundle.size: 1000
# ↑ PyFlink bundles records and sends them to the Python process in batches.
#   bundle.size = max records per batch.
#   Larger bundles → better throughput (fewer IPC round-trips)
#   Larger bundles → higher latency per individual record
#   For fraud detection (latency-sensitive): keep this relatively small (100–1000)

python.fn-execution.bundle.time: 1000
# ↑ Maximum time (milliseconds) to hold a bundle before sending to Python,
#   even if bundle.size is not reached.
#   This is a latency guarantee: even in low-traffic periods, records are
#   processed within 1 second.

python.fn-execution.arrow.batch.size: 10000
# ↑ When using pandas UDFs (Vectorized UDFs with Arrow), batch size for
#   converting between JVM and Python.


# =============================================================================
# SECTION 7: NETWORK & SHUFFLE
# =============================================================================

taskmanager.network.memory.fraction: 0.1
# ↑ Fraction of total Flink memory allocated to network buffers.
#   Network buffers are used to buffer data during shuffle operations
#   (e.g., when records are repartitioned by customer_id with keyBy()).
#   10% is the default; increase if you see "InsufficientResourceException"
#   related to network buffers.

taskmanager.network.memory.min: 64mb
taskmanager.network.memory.max: 1gb
# ↑ Bounds on network memory regardless of the fraction calculation.


# =============================================================================
# SECTION 8: HIGH AVAILABILITY (for multi-node clusters)
# =============================================================================
# HA ensures the JobManager can be restarted on a different machine
# if it fails. Uses ZooKeeper for leader election and coordination.
# For this single-node tutorial, HA is disabled (NONE).
# =============================================================================

high-availability: NONE
# high-availability: zookeeper
# high-availability.zookeeper.quorum: zookeeper:2181
# high-availability.zookeeper.path.root: /flink
# high-availability.cluster-id: /fraud-detection-cluster
# high-availability.storageDir: hdfs:///flink/recovery


# =============================================================================
# SECTION 9: METRICS & MONITORING
# =============================================================================

metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
# ↑ Export Flink metrics to Prometheus (comment out if not using Prometheus)
metrics.reporter.prom.port: 9249

metrics.latency.history-size: 128
# ↑ Keep the last 128 latency measurements for each operator.
#   Latency metrics tell you how long it takes from event creation
#   to output — critical for SLA monitoring in fraud detection.


# =============================================================================
# SECTION 10: LOGGING
# =============================================================================

env.log.level: INFO
# ↑ Log level for Flink daemons: DEBUG, INFO, WARN, ERROR
#   Use DEBUG during development to trace watermark advancement and state access.
#   Use WARN or ERROR in production to reduce log volume.
